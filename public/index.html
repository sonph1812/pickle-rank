<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pick Team Manager | Bảng Xếp Hạng Đội Bóng</title>
  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <!-- Ambient background glows -->
  <div class="glow-bg">
    <div class="glow-sphere glow-1"></div>
    <div class="glow-sphere glow-2"></div>
  </div>

  <div class="app-container">
    <!-- Header -->
    <header class="app-header">
      <div class="logo-area">
        <div class="logo-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
            <circle cx="12" cy="12" r="10"></circle>
            <path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"></path>
            <path d="M2 12h20"></path>
          </svg>
        </div>
        <div class="logo-text">
          <h1>Pick<span>Pick</span></h1>
          <p>Hệ thống Quản lý Đội bóng & Xếp hạng</p>
        </div>
      </div>
      <div class="actions-area">
        <button id="btn-add-team" class="btn btn-primary">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
            <line x1="12" y1="5" x2="12" y2="19"></line>
            <line x1="5" y1="12" x2="19" y2="12"></line>
          </svg>
          Thêm Đội Bóng
        </button>
      </div>
    </header>

    <!-- Stats Dashboard -->
    <section class="stats-grid">
      <div class="stat-card">
        <div class="stat-icon icon-blue">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"></path>
            <circle cx="9" cy="7" r="4"></circle>
            <path d="M23 21v-2a4 4 0 0 0-3-3.87"></path>
            <path d="M16 3.13a4 4 0 0 1 0 7.75"></path>
          </svg>
        </div>
        <div class="stat-content">
          <h3>Tổng Số Đội</h3>
          <p id="stat-total-teams">0</p>
        </div>
      </div>

      <div class="stat-card">
        <div class="stat-icon icon-green">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="12" cy="12" r="10"></circle>
            <path d="M8 12h8"></path>
            <path d="M12 8v8"></path>
          </svg>
        </div>
        <div class="stat-content">
          <h3>Trận Đã Đá</h3>
          <p id="stat-total-matches">0</p>
        </div>
      </div>

      <div class="stat-card">
        <div class="stat-icon icon-yellow">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"></path>
          </svg>
        </div>
        <div class="stat-content">
          <h3>Đội Dẫn Đầu</h3>
          <p id="stat-top-team">-</p>
        </div>
      </div>
    </section>

    <!-- Main Content Area (Leaderboard) -->
    <main class="main-content">
      <div class="card leaderboard-card">
        <div class="card-header">
          <h2>Bảng Xếp Hạng Chi Tiết</h2>
          <div class="badge-count"><span id="team-count">0</span> Đội</div>
        </div>
        
        <div class="table-wrapper">
          <table class="leaderboard-table">
            <thead>
              <tr>
                <th class="col-rank">Hạng</th>
                <th class="col-name">Đội Bóng / Trận Đấu</th>
                <th class="col-played">Số Trận</th>
                <th class="col-win">Thắng</th>
                <th class="col-loss">Thua</th>
                <th class="col-gd">Hiệu Số</th>
                <th class="col-points">Điểm</th>
                <th class="col-actions">Hành Động</th>
              </tr>
            </thead>
            <tbody id="leaderboard-body">
              <tr>
                <td colspan="9" class="td-empty">Đang tải danh sách đội bóng...</td>
              </tr>
            </tbody>
          </table>
        </div>
      </div>
    </main>
  </div>

  <!-- Modal Form (Add / Edit) -->
  <div id="team-modal" class="modal-overlay">
    <div class="modal-card">
      <div class="modal-header">
        <h2 id="modal-title">Thêm Đội Bóng Mới</h2>
        <button id="btn-close-modal" class="btn-close">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <line x1="18" y1="6" x2="6" y2="18"></line>
            <line x1="6" y1="6" x2="18" y2="18"></line>
          </svg>
        </button>
      </div>
      
      <form id="team-form" class="modal-body">
        <input type="hidden" id="field-id">
        
        <div class="form-group-image">
          <label>Logo Đội Bóng (Nén & Lưu Miễn Phí)</label>
          <div class="image-upload-container">
            <div id="logo-preview" class="logo-preview-box">
              <span class="placeholder-icon">⚽</span>
            </div>
            <div class="upload-actions">
              <input type="file" id="field-logo-file" accept="image/*" style="display: none;">
              <button type="button" id="btn-upload-trigger" class="btn btn-secondary">Chọn Logo</button>
              <button type="button" id="btn-remove-logo" class="btn btn-secondary btn-danger-style" style="display: none;">Xóa Logo</button>
              <input type="hidden" id="field-logo-base64">
            </div>
          </div>
        </div>

        <div class="form-group">
          <label for="field-name">Tên đội bóng / Tên trận đấu</label>
          <input type="text" id="field-name" placeholder="Ví dụ: FC Antigravity" required>
        </div>
        
        <div class="form-row">
          <div class="form-group">
            <label for="field-wins">Thắng</label>
            <input type="number" id="field-wins" min="0" value="0" required>
          </div>
          
          <div class="form-group">
            <label for="field-losses">Thua</label>
            <input type="number" id="field-losses" min="0" value="0" required>
          </div>
        </div>

        <div class="form-row">
          <div class="form-group">
            <label for="field-gd">Hiệu số (+/-)</label>
            <input type="number" id="field-gd" value="0" required>
          </div>
          
          <div class="form-group">
            <label>Điểm tính toán (Dự kiến)</label>
            <div id="preview-points" class="preview-value">0</div>
          </div>
        </div>

        <div class="modal-footer">
          <button type="button" id="btn-cancel-modal" class="btn btn-secondary">Hủy bỏ</button>
          <button type="submit" id="btn-submit-form" class="btn btn-primary">Lưu Thay Đổi</button>
        </div>
      </form>
    </div>
  </div>

  <!-- Toast Container -->
  <div id="toast-container" class="toast-container"></div>

  <!-- App Logic -->
  <script src="js/app.js"></script>
</body>
</html>
